<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Story Builder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app">
    <!-- Header -->
    <div class="top-bar">
      <h1>Characters</h1>
    </div>

    <!-- Navigation -->
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="characters.html" class="active">Characters</a>
      <a href="scenes.html">Scenes</a>
      <a href="locations.html">Locations</a>
    </nav>

    <!-- Tool Bar -->
    <div class="toolbar">
      <label for="import-file" class="btn">Import</label>
      <input type="file" id="import-file" />
      <button id="export-data">Export</button>
    </div>

    <!-- Form -->
    <form id="character-form">
      <input type="text" id="name" placeholder="Character name" required />
      <input type="text" id="description" placeholder="Description" required />
      <button type="submit">Add character</button>
      <button type="button" id="cancel-edit" style="display:none;">Cancel</button>
    </form>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search characters..." />
    </div>

    <ul id="character-list"></ul>

    <script type="module" src="js/characters.js"></script>
  </div>
</body>
</html>
