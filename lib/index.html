<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Story Builder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="top-bar">
      <h1>Story Builder</h1>
    </header>

    <!-- Navigation -->
    <nav class="main-nav">
      <a href="index.html" class="active">Home</a>
      <a href="characters.html">Characters</a>
      <a href="chapters.html">Chapters</a>
      <a href="locations.html">Locations</a>
    </nav>

    <!-- Tool Bar -->
    <div class="toolbar">
      <label for="import-file" class="btn">Import</label>
      <input type="file" id="import-file" />
      <button id="export-data">Export</button>
      <button class="danger" id="delete-data">Delete</button>
    </div>
    <!-- Dashboard -->
    <main>
      <!-- Navigation Cards -->
      <section class="dashboard-grid">

        <a href="characters.html" class="card nav-card">
          <h2>Characters</h2>
          <p>Create and manage your characters</p>
        </a>

        <a href="chapters.html" class="card nav-card">
          <h2>Chapters</h2>
          <p>Write and organize your story</p>
        </a>

        <a href="locations.html" class="card nav-card">
          <h2>Locations</h2>
          <p>Build your world</p>
        </a>

      </section>

      <!-- Stats -->
      <section class="stats">
        <div class="card stat-card">
          <h3 id="char-count">0</h3>
          <p>Characters</p>
        </div>

        <div class="card stat-card">
          <h3 id="scene-count">0</h3>
          <p>Scenes</p>
        </div>

        <div class="card stat-card">
          <h3 id="location-count">0</h3>
          <p>Locations</p>
        </div>
      </section>

      <!-- Writing Progress -->
      <section class="card progress-card">
        <h2>Writing Progress</h2>

        <div class="progress-info">
          <span id="word-count">0 words</span>
          <span id="scene-total">0 scenes</span>
        </div>

        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </section>

      <!-- Recent Scenes -->
      <section class="card">
        <h2>Recent Scenes</h2>
        <ul id="recent-scenes"></ul>
      </section>
    </main>
  </div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
